# cTrader API Settings
ctrader:
  host: "demo.ctraderapi.com"
  port: 5035
  heartbeat_interval: 10
  watchdog_timeout: 30

# Strategy Settings
strategy:
  symbol_name: "XAUUSD"
  target_confidence: 0.90
  dry_run: false
  model_path: "xgboost_gold_model.json"
  allow_mock_model: false
  
# Risk Management
risk:
  max_drawdown_pct: 10.0 
  stop_loss_pips: 20
  take_profit_pips: 50
  auto_break_even_pips: 15
  dynamic_sizing: true
  risk_per_trade_pct: 3.0
  daily_profit_target: 150
  max_daily_loss: 15
  max_positions: 3

# Telegram Settings
telegram:
  enabled: true
  notifications:
    on_trade: true
    on_error: true
    on_reconnect: true

# Logging Settings
logging:
  level: "INFO"
  log_to_file: true
  csv_file: "live_gold_data.csv"
  json_log: "bot_audit.log"
